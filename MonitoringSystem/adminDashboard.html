<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="adminDashboard.css">
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<header class="top-nav">
    <img class="logo" src="buslogo-removebg-preview.png" alt="bus logo">
    <nav>
        <ul>
            <li><a href="#dashboard" class="active">Dashboard</a></li>
            <li><a href="#studentsReg">Students Registration</a></li>
            <li><a href="#studentsList">Student List</a></li>
            <li><a href="#reports">Reports</a></li>
            <img class="profile" src="logout-removebg-preview.png" alt="Profile Image">
        </ul>
    </nav>
</header>

<section class="main" id="dashboard">
   <section class="title-card">
   <div class="overlay">
        <div class="title-content">
            <h1>Student Transport Monitoring System</h1>
        </div>
    </div>
    <div class="cards">
        <div class="card">
            <h3>Total Registered Students</h3>
            <p>0</p>
            <img src="students-removebg-preview.png">
        </div>
        <div class="card">
            <h3>Total Bus</h3>
            <p>0</p>
            <img src="bus-removebg-preview.png">
        </div>
    </div>
    </section>

</section>
    <section class="main" id="studentsReg">
        <div class="container">
    
    <div class="left">
        <img src="buslogo-removebg-preview.png" alt="image">
    </div>

    <div class="right">
        <h2>Register Student</h2>

       <form class="form" id="studentForm">
    <input type="text" id="name" placeholder="Student Name" required>
    <input type="text" id="lrn" placeholder="LRN" required>
    <input type="text" id="grade" placeholder="Grade Level" required>
    <input type="text" id="section" placeholder="Section" required>
    <input type="text" id="address" placeholder="Address" required>

    <button type="submit">Register</button>
</form>
    </div>
       
</div>
<div id="qrcode"></div>
<section class="main" id="studentsList">      
    <div class="table">
        <div class="table-box">
    <h3>REGISTERED STUDENTS</h3>
    <div class="search-box">
    <img src="searchh.png" class="search-icon">
    <input type="text" class="search" placeholder="Search...">
</div>
    <table>
        <tr>
            <th>LRN</th>
            <th>Name of Students</th>
            <th>Grade Level</th>
            <th>Section</th>
            <th>Address</th>
            <th>QR Code</th>
        </tr>
    </table>
    </div>
    </section>
    <section class="main" id="reports">
        <h1>Reports</h1>
    </section>
    <script src="adminDashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</body>
</html>
